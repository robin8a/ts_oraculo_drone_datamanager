version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - chmod +x scripts/amplify-pull-for-build.sh
        - bash scripts/amplify-pull-for-build.sh
    build:
      commands:
        - npm run build
    postBuild:
      commands:
        - chmod +x scripts/apply-amplify-custom-rules.sh
        - bash scripts/apply-amplify-custom-rules.sh || echo "[amplify-rules] Sync omitido (aplica con npm run amplify:redirects)"
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*

# Rewrites: infra/amplify/custom-rules.json (no usar redirects aquí; Amplify Hosting no los lee del YAML).
# Producción: VITE_WORKFLOW_API_URL=/workflow-api

version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - chmod +x scripts/amplify-pull-for-build.sh
        - bash scripts/amplify-pull-for-build.sh
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
# Rewrites (proxy + SPA). Deben estar ANTES de la regla catch-all en la consola si editas ahí.
redirects:
  - source: /workflow-api/<*>
    target: https://vqad6x2236.execute-api.us-east-1.amazonaws.com/<*>
    status: '200'
  - source: /<*>
    target: /index.html
    status: '404-200'

# Amplify Console → VITE_WORKFLOW_API_URL=/workflow-api

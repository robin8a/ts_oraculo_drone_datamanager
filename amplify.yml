version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  # SPA: /admin/users, /files, etc. → index.html (evita 404 al recargar)
  customRedirects:
    - source: '/<*>'
      target: '/index.html'
      status: '404-200'
  cache:
    paths:
      - node_modules/**/*

version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - chmod +x scripts/amplify-pull-for-build.sh
        - bash scripts/amplify-pull-for-build.sh
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
# Orden: de más específico a más general. Las reglas 200 de /workflow-api deben ir PRIMERO.
redirects:
  - source: /workflow-api/users/supervisors
    target: https://vqad6x2236.execute-api.us-east-1.amazonaws.com/users/supervisors
    status: '200'
  - source: /workflow-api/users/supervisors/
    target: https://vqad6x2236.execute-api.us-east-1.amazonaws.com/users/supervisors
    status: '200'
  - source: /workflow-api/users
    target: https://vqad6x2236.execute-api.us-east-1.amazonaws.com/users
    status: '200'
  - source: /workflow-api/users/
    target: https://vqad6x2236.execute-api.us-east-1.amazonaws.com/users
    status: '200'
  - source: /workflow-api/<*>
    target: https://vqad6x2236.execute-api.us-east-1.amazonaws.com/<*>
    status: '200'
  - source: /<*>
    target: /index.html
    status: '404-200'

# VITE_WORKFLOW_API_URL=/workflow-api
# Si ves 301 → .../users/ : borra en consola reglas "añadir barra final" y vacía caché del navegador.
